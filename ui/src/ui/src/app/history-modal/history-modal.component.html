<h1 mat-dialog-title>Settings History</h1>
<div mat-dialog-content>
  <ng-container *ngIf="historySettings$ | async as settings">
    <table mat-table [dataSource]="settings" class="mat-elevation-z8" *ngIf="settings.length > 0; else noHistory">
      <!-- Logo Column -->
      <ng-container matColumnDef="logo">
        <th mat-header-cell *matHeaderCellDef> Logo </th>
        <td mat-cell *matCellDef="let element">
          <img [src]="element.logo || './assets/dummy.svg'" alt="Logo" class="history-logo">
        </td>
      </ng-container>

      <!-- Brand Name Column -->
      <ng-container matColumnDef="brandName">
        <th mat-header-cell *matHeaderCellDef> Brand Name </th>
        <td mat-cell *matCellDef="let element"> {{element.brandName}} </td>
      </ng-container>

      <!-- Primary Color Column -->
      <ng-container matColumnDef="primaryColor">
        <th mat-header-cell *matHeaderCellDef> Primary Color </th>
        <td mat-cell *matCellDef="let element">
          <div class="color-cell">
            <span class="history-color-swatch" [style.backgroundColor]="element.primaryColor"></span>
            <span>{{element.primaryColor}}</span>
          </div>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button (click)="applySetting(element)" matTooltip="Apply Setting">
            <mat-icon>check_circle_outline</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteSetting(element.id, $event)" matTooltip="Delete Setting">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="['logo', 'brandName', 'primaryColor', 'actions']"></tr>
      <tr mat-row *matRowDef="let row; columns: ['logo', 'brandName', 'primaryColor', 'actions'];"></tr>
    </table>
    <ng-template #noHistory>
      <p>No settings history found.</p>
    </ng-template>
  </ng-container>
</div>
<div mat-dialog-actions>
  <button mat-button (click)="dialogRef.close()">Close</button>
</div>
