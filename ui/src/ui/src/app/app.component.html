<!--
  Main application layout with a header (simulated for brand name/logo)
  and a settings button that toggles the side navigation.
-->
<div class="app-container">
  <!-- Application Header (where personalization will be visible) -->
  <header class="app-header">
    <div class="flex items-center gap-4">
      <!-- Dynamically display the logo -->
      <img [src]="logoPreview || './assets/dummy.png'" alt="App Logo" class="app-logo"/>
      <!-- Dynamically display the brand name -->
      <h1 class="app-brand-name">{{ brandName }}</h1>
    </div>

    <!-- Settings button -->
    <span>
      <button
        mat-icon-button
        matTooltip="App Settings"
        (click)="settingsSidenav.toggle()"
        class="text-white"
      >
        <mat-icon>settings</mat-icon>
      </button>
    </span>
  </header>

  <!-- Main content area (for demonstration, just a centered button) -->
  <main class="main-content">
    <button mat-raised-button color="primary">
      Example Primary Button
    </button>
    <button mat-flat-button class="secondary-button">
      Example Secondary Button
    </button>
  </main>

  <!-- Sidenav for UI Personalization -->
  <mat-sidenav-container class="sidenav-container">
    <mat-sidenav #settingsSidenav position="end" class="settings-sidenav">
      <div class="settings-content">
        <h3 class="settings-title">App Settings</h3>

        <!-- NEW: Load Previous Settings Checkbox -->
        <mat-checkbox [(ngModel)]="loadPreviousSettings" (change)="onLoadPreviousSettingsChange()"
                      class="load-settings-checkbox">
          Load Previous Settings
        </mat-checkbox>
        <mat-divider class="divider"></mat-divider>

        <!-- 1. Logo Section -->
        <div class="logo-section">
          <img
            [src]="logoPreview || './assets/dummy.png'"
            alt="Logo Preview"
            class="logo-preview-img"
          />
          <input type="file" #logoInput hidden (change)="onLogoSelected($event)" />
          <button mat-raised-button color="primary" (click)="logoInput.click()">
            Upload Logo
          </button>
        </div>

        <mat-divider class="divider"></mat-divider>

        <!-- 2. Brand Name Input -->
        <mat-form-field appearance="fill" class="full-width-input">
          <mat-label>Brand Name</mat-label>
          <input matInput [(ngModel)]="brandName" />
        </mat-form-field>

        <mat-divider class="divider"></mat-divider>

        <!-- 3. Color Pickers -->
        <div class="color-picker-section">
          <label for="colorPicker" class="color-picker-label">
            Choose Theme Color
          </label>
          <input
            id="colorPicker"
            type="color"
            [(ngModel)]="primaryColor"
            class="color-input"
          />
        </div>

        <mat-divider class="divider"></mat-divider>

        <div class="button-group">
          <!-- Save Button -->
          <button mat-raised-button color="primary" (click)="saveSettings()">
            Save
          </button>
          <!-- Reset Button -->
          <button mat-raised-button color="warn" (click)="resetSettings()">
            Reset
          </button>
        </div>
      </div>
    </mat-sidenav>
    <mat-sidenav-content></mat-sidenav-content>
  </mat-sidenav-container>
</div>
